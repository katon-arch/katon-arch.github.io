<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
font-size:20px;
padding:12px 20px;
margin:6px;
border:none;
border-radius:8px;
}

#video{
width:90%;
max-width:500px;
border-radius:10px;
}

#gallery img{
width:80px;
margin:5px;
border:3px solid transparent;
border-radius:5px;
cursor:pointer;
}

.selected{
border-color:yellow;
}

#frameSelector img{
width:100px;
margin:5px;
border:3px solid transparent;
cursor:pointer;
}

.frameSelected{
border-color:lime;
}

#timer{
font-size:28px;
margin:10px;
}

</style>
</head>

<body>

<div id="startScreen">
<h1>Photobooth</h1>
<button onclick="startSession()">TAP TO START</button>
</div>

<div id="booth" style="display:none">

<div id="timer">05:00</div>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="takePhoto()">CAPTURE</button>
<button onclick="retakeAll()">RETAKE ALL</button>
<button onclick="goSelect()">NEXT</button>

<div id="gallery"></div>

</div>

<div id="selectScreen" style="display:none">

<h2>Select 4 Photos</h2>

<div id="selectGallery"></div>

<h2>Select Frame</h2>

<div id="frameSelector"></div>

<br>

<button onclick="generateStrip()">GENERATE</button>

<canvas id="canvas" width="1200" height="3600" style="display:none"></canvas>

<br>

<a id="downloadBtn" download="photostrip.png" style="display:none">
DOWNLOAD PHOTO
</a>

</div>

<script>

let video = document.getElementById("video");
let gallery = document.getElementById("gallery");
let selectGallery = document.getElementById("selectGallery");

let photos = [];
let selectedPhotos = [];
let selectedFrame = null;

let sessionTime = 300;

const frames = [
"frames/frame1.png",
"frames/frame2.png"
];

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
});

function startSession(){

document.getElementById("startScreen").style.display="none";
document.getElementById("booth").style.display="block";

startTimer();

}

function takePhoto(){

let canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

let ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

let img = canvas.toDataURL("image/png");

photos.push(img);

let image = document.createElement("img");
image.src = img;

gallery.appendChild(image);

}

function retakeAll(){

if(!confirm("Delete all photos?")) return;

photos=[];
gallery.innerHTML="";

}

function startTimer(){

let interval = setInterval(()=>{

sessionTime--;

let m = Math.floor(sessionTime/60);
let s = sessionTime%60;

document.getElementById("timer").innerText =
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

if(sessionTime<=0){
clearInterval(interval);
alert("Session End");
location.reload();
}

},1000)

}

function goSelect(){

document.getElementById("booth").style.display="none";
document.getElementById("selectScreen").style.display="block";

renderSelectGallery();
renderFrames();

}

function renderSelectGallery(){

selectGallery.innerHTML="";
selectedPhotos=[];

photos.forEach((photo)=>{

let img=document.createElement("img");
img.src=photo;

img.addEventListener("click",()=>{

if(img.classList.contains("selected")){

img.classList.remove("selected");
selectedPhotos = selectedPhotos.filter(p=>p!==photo);

}else{

if(selectedPhotos.length>=4){
alert("Maximum 4 photos");
return;
}

img.classList.add("selected");
selectedPhotos.push(photo);

}

});

selectGallery.appendChild(img);

});

}
function renderFrames(){

let frameSelector=document.getElementById("frameSelector");

frames.forEach(f=>{

let img=document.createElement("img");

img.src=f;

img.onclick=()=>{

selectedFrame=f;

document.querySelectorAll("#frameSelector img")
.forEach(x=>x.classList.remove("frameSelected"));

img.classList.add("frameSelected");

};

frameSelector.appendChild(img);

});

}

function generateStrip(){

if(selectedPhotos.length!==4){
alert("Select 4 photos");
return;
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let loaded=0;

selectedPhotos.forEach((src,index)=>{

let img=new Image();

img.onload=function(){

ctx.drawImage(img,0,index*900,1200,900);

loaded++;

if(loaded===4){
addFrame();
}

}

img.src=src;

});

}

function addFrame(){

if(!selectedFrame){
alert("Select frame");
return;
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let frame=new Image();

frame.onload=function(){

ctx.drawImage(frame,0,0,1200,3600);

let data=canvas.toDataURL("image/png");

let link=document.getElementById("downloadBtn");

link.href=data;
link.style.display="inline-block";

}

frame.src=selectedFrame;

}

</script>

</body>
