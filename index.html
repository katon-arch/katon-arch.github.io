<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photobooth</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- ================= START SCREEN ================= -->

<section id="startScreen" class="landing">

<div class="landing-container">

<div class="logo-icon">
✨
</div>

<h1 class="title">
Arka <span>PhotoBooth</span>
</h1>

<p class="subtitle">
Capture your best moments with our modern, AI-powered photobooth experience.
</p>

<button class="start-btn" onclick="startSession()">

📷 Start Photobooth

</button>

</div>

</section>



<!-- ================= CAMERA BOOTH ================= -->

<section id="booth" style="display:none">

<div id="timer">
05:00
</div>

<video id="video" autoplay playsinline></video>

<div>

<button onclick="takePhoto()">
CAPTURE
</button>

<button onclick="retakeAll()">
RETAKE ALL
</button>

<button onclick="goSelect()">
NEXT
</button>

</div>

<div id="gallery"></div>

</section>



<!-- ================= PHOTO SELECT SCREEN ================= -->

<section id="selectScreen" style="display:none">

<h2>Select 4 Photos</h2>
<div id="selectGallery"></div>
  
<h2>Select Frame</h2>

<div id="frameSelector"></div>

<h2>Preview</h2>

<canvas id="previewCanvas" width="300" height="900"></canvas>

<br>

<button id="generateBtn" onclick="generateStrip()">
GENERATE IMAGE
</button>

<br>

<a id="downloadBtn" download="photostrip.png" style="display:none">
DOWNLOAD PHOTO
</a>

<canvas id="canvas" width="1200" height="3600" style="display:none"></canvas>
</section>

<script src="script.js"></script>

</body>

</html>
