<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photobooth</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- ================= START SCREEN ================= -->

<section id="startScreen">

<h1>Photobooth</h1>

<button onclick="startSession()">
TAP TO START
</button>

</section>



<!-- ================= CAMERA BOOTH ================= -->

<section id="booth" style="display:none">

<div id="timer">
05:00
</div>

<video id="video" autoplay playsinline></video>

<div>

<button onclick="takePhoto()">
CAPTURE
</button>

<button onclick="retakeAll()">
RETAKE ALL
</button>

<button onclick="goSelect()">
NEXT
</button>

</div>

<div id="gallery"></div>

</section>



<!-- ================= PHOTO SELECT SCREEN ================= -->

<section id="selectScreen" style="display:none">

<h2>Select 4 Photos</h2>

<div id="selectGallery"></div>

<button onclick="clearSelection()">
CLEAR SELECTION
</button>


<h2>Preview</h2>

<canvas id="previewCanvas" width="300" height="900"></canvas>

<br>

<button onclick="previewStrip()">
PREVIEW
</button>

<button onclick="generateStrip()">
GENERATE PHOTO
</button>


<a id="downloadBtn" download="photostrip.png" style="display:none">
DOWNLOAD PHOTO
</a>


<canvas id="canvas" width="1200" height="3600" style="display:none"></canvas>

</section>



<script src="script.js"></script>

</body>

</html>
