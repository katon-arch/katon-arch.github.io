<!DOCTYPE html>
<html>
<head>

<title>Photobooth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen">
<h1>Photobooth</h1>

</div>

<script src="script.js"></script>

</body>
</html>
